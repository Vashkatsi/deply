name: Release package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python setup.py sdist bdist_wheel

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check deply tests

  typing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Mypy
        run: |
          mypy deply

  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover tests

  coverage-gates:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run line coverage gate
        run: |
          python -m coverage run --source=deply -m unittest discover tests
          python -m coverage report -m --fail-under=95

      - name: Build branch coverage report
        run: |
          python -m coverage run --branch --source=deply -m unittest discover tests
          python -m coverage json -o coverage-branch.json

      - name: Enforce branch coverage threshold
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          coverage_report_path = Path("coverage-branch.json")
          coverage_report = json.loads(coverage_report_path.read_text(encoding="utf-8"))
          coverage_totals = coverage_report.get("totals", {})
          covered_branches = coverage_totals.get("covered_branches", 0)
          total_branches = coverage_totals.get("num_branches", 0)
          required_branch_coverage_percent = 90.0

          if total_branches == 0:
              print(
                  "Branch coverage gate failed: no measured branches "
                  f"(required >= {required_branch_coverage_percent:.2f}%)."
              )
              sys.exit(1)

          branch_coverage_percent = (covered_branches / total_branches) * 100
          print(
              "Branch coverage: "
              f"{branch_coverage_percent:.2f}% ({covered_branches}/{total_branches})"
          )

          if branch_coverage_percent < required_branch_coverage_percent:
              print(
                  "Branch coverage gate failed: "
                  f"{branch_coverage_percent:.2f}% < {required_branch_coverage_percent:.2f}%."
              )
              sys.exit(1)

          print(
              "Branch coverage gate passed: "
              f"{branch_coverage_percent:.2f}% >= {required_branch_coverage_percent:.2f}%."
          )
          PY

  release:
    runs-on: ubuntu-latest
    needs: [build, lint, typing, security, test, coverage-gates]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist

      - name: Validate tag and package version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Release tag must start with 'v'. Got: ${GITHUB_REF_NAME}"
            exit 1
          fi

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          init_file_content = Path("deply/__init__.py").read_text(encoding="utf-8")
          version_match = re.search(r"__version__ = '([^']+)'", init_file_content)
          if version_match is None:
              raise SystemExit("Unable to read __version__ from deply/__init__.py")
          print(version_match.group(1))
          PY
          )

          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match package version (${PACKAGE_VERSION})."
            exit 1
          fi

      - name: Run twine check
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Run wheel smoke test
        run: |
          python -m venv /tmp/deply-smoke
          /tmp/deply-smoke/bin/pip install --upgrade pip
          /tmp/deply-smoke/bin/pip install dist/*.whl
          /tmp/deply-smoke/bin/deply --version

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload dist/*
