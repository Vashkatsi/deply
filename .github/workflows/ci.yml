name: Python package

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check deply tests

  typing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Mypy
        run: |
          mypy deply

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover tests

  coverage-gates:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run line coverage gate
        run: |
          python -m coverage run --source=deply -m unittest discover tests
          python -m coverage report -m --fail-under=95

      - name: Build branch coverage report
        run: |
          python -m coverage run --branch --source=deply -m unittest discover tests
          python -m coverage json -o coverage-branch.json

      - name: Enforce branch coverage threshold
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          coverage_report_path = Path("coverage-branch.json")
          coverage_report = json.loads(coverage_report_path.read_text(encoding="utf-8"))
          coverage_totals = coverage_report.get("totals", {})
          covered_branches = coverage_totals.get("covered_branches", 0)
          total_branches = coverage_totals.get("num_branches", 0)
          required_branch_coverage_percent = 90.0

          if total_branches == 0:
              print(
                  "Branch coverage gate failed: no measured branches "
                  f"(required >= {required_branch_coverage_percent:.2f}%)."
              )
              sys.exit(1)

          branch_coverage_percent = (covered_branches / total_branches) * 100
          print(
              "Branch coverage: "
              f"{branch_coverage_percent:.2f}% ({covered_branches}/{total_branches})"
          )

          if branch_coverage_percent < required_branch_coverage_percent:
              print(
                  "Branch coverage gate failed: "
                  f"{branch_coverage_percent:.2f}% < {required_branch_coverage_percent:.2f}%."
              )
              sys.exit(1)

          print(
              "Branch coverage gate passed: "
              f"{branch_coverage_percent:.2f}% >= {required_branch_coverage_percent:.2f}%."
          )
          PY

  mutation:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run mutation tests (report-only)
        run: |
          mutmut run
          mutmut export-cicd-stats

      - name: Validate mutation execution
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path("mutants/mutmut-cicd-stats.json")
          if not report_path.exists():
              print("Mutation report is missing.")
              sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          total = int(report.get("total", 0))
          no_tests = int(report.get("no_tests", 0))
          technical_issue_count = (
              int(report.get("timeout", 0))
              + int(report.get("suspicious", 0))
              + int(report.get("check_was_interrupted_by_user", 0))
              + int(report.get("segfault", 0))
          )

          if total == 0:
              print("Mutation execution failed: total mutants is zero.")
              sys.exit(1)

          if no_tests == total:
              print("Mutation execution failed: all mutants reported as no-tests.")
              sys.exit(1)

          if technical_issue_count > 0:
              print(
                  "Mutation execution failed due to technical issues: "
                  f"{technical_issue_count}."
              )
              sys.exit(1)

          print("Mutation execution validation passed.")
          PY

      - name: Publish mutation summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("mutants/mutmut-cicd-stats.json")

          if not report_path.exists():
              with summary_path.open("a", encoding="utf-8") as summary_file:
                  summary_file.write("## Mutation Testing (report-only)\n\n")
                  summary_file.write("- Report was not generated.\n")
              raise SystemExit(0)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          killed = int(report.get("killed", 0))
          survived = int(report.get("survived", 0))
          total = int(report.get("total", 0))
          timeout = int(report.get("timeout", 0))
          suspicious = int(report.get("suspicious", 0))
          no_tests = int(report.get("no_tests", 0))
          skipped = int(report.get("skipped", 0))
          score = (killed / total * 100.0) if total else 0.0

          with summary_path.open("a", encoding="utf-8") as summary_file:
              summary_file.write("## Mutation Testing (report-only)\n\n")
              summary_file.write(f"- Total mutants: {total}\n")
              summary_file.write(f"- Killed: {killed}\n")
              summary_file.write(f"- Survived: {survived}\n")
              summary_file.write(f"- No tests: {no_tests}\n")
              summary_file.write(f"- Timeout: {timeout}\n")
              summary_file.write(f"- Suspicious: {suspicious}\n")
              summary_file.write(f"- Skipped: {skipped}\n")
              summary_file.write(f"- Mutation score: {score:.2f}%\n")
          PY

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: |
            mutants/mutmut-cicd-stats.json
            mutants/mutmut-stats.json
            mutants/**/*.meta

  publish:
    runs-on: ubuntu-latest
    needs: [lint, typing, security, test, coverage-gates]
    if: github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Update version and README badges
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          sed -i "s/__version__ = .*/__version__ = '${TAG_NAME}'/" deply/__init__.py
          echo "Updated version in deply/__init__.py to ${TAG_NAME}"
          # Get the new version from deply/__init__.py
          NEW_VERSION=$(sed -n "s/__version__ = '\(.*\)'/\1/p" deply/__init__.py)
          # Get the coverage percent from the test job output
          NEW_COVERAGE=${{ needs.test.outputs.coverage }}
          echo "Updating README badges with version ${NEW_VERSION} and coverage ${NEW_COVERAGE}%"
          # Update stable badge: matches "stable-v*" and replaces with new version badge
          sed -i "s/stable-v[0-9\.]\+/stable-v${NEW_VERSION}/" README.md
          # Update coverage badge: matches "coverage-[0-9]*%" and replaces with new coverage percent
          sed -i "s/coverage-[0-9]\+%/coverage-${NEW_COVERAGE}%/" README.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b temp-branch
          git add deply/__init__.py
          git add README.md
          git commit -m "Update version and README badges"
          git push origin temp-branch:main

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python setup.py sdist bdist_wheel
          python -m twine upload dist/*
